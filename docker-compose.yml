services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      SIGNALSCOPE_ENVIRONMENT: development
      SIGNALSCOPE_CORS_ORIGINS: http://localhost:3000
      SIGNALSCOPE_DATA_DIR: data/demo
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      SIGNALSCOPE_API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
